<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FabriSync Reset</title>
    <style>
      body { font-family: system-ui, Arial; padding: 24px; }
      .box { max-width: 560px; margin: 0 auto; }
      .btn { display:inline-block; padding:12px 16px; border-radius:10px; border:1px solid #ddd; text-decoration:none; margin-right: 10px; }
      .muted { color:#666; font-size: 14px; }
      code { background:#f4f4f4; padding:2px 6px; border-radius:6px; }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Open FabriSync to reset your password</h2>
      <p class="muted">
        Mobile: we’ll try to open the app automatically.<br/>
        Desktop: click “Open in App” (or later, when your web app is hosted, we’ll redirect to web).
      </p>

      <p>
        <a id="openApp" class="btn" href="#">Open in App</a>
        <a id="openWeb" class="btn" href="#">Open in Web</a>
      </p>

      <p class="muted">
        If you haven’t hosted the full web app yet, the “Open in Web” button won’t work.
      </p>

      <p class="muted">Debug: <code id="dbg"></code></p>
    </div>

    <script>
      (function () {
        const qs = window.location.search || "";

        // ✅ Mobile deep link (your app)
        const appLink = "io.supabase.fabrisync://reset-callback" + qs;

        // ✅ Web link (ONLY after you host your full Flutter web on Firebase root)
        // Example later: https://fabrisync-d4a57.web.app/#/reset-password?code=...
        const webLink = "https://fabrisync-d4a57.web.app/#/reset-password" + qs;

        document.getElementById("openApp").href = appLink;
        document.getElementById("openWeb").href = webLink;
        document.getElementById("dbg").textContent = window.location.href;

        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        // ✅ Only auto-open app on mobile. DO NOT auto-redirect to web (avoids “vanish”).
        if (isMobile) {
          window.location.href = appLink;
        }
      })();
    </script>
  </body>
</html>
